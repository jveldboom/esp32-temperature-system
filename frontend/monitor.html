<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 Serial Monitor</title>
  <link rel="stylesheet" href="common.css">
</head>
<body class="dark">
  <h1>ESP32 Serial Monitor</h1>
  <p>View serial output from your ESP32 device</p>

  <nav>
    <a href="index.html">Flash Firmware</a>
    <a href="monitor.html" class="active">Serial Monitor</a>
  </nav>

  <div class="controls">
    <button id="connect-btn">Connect</button>
    <button id="disconnect-btn" class="disconnect" disabled>Disconnect</button>
    <button id="reset-btn" disabled>Restart Device</button>
    <button id="clear-btn">Clear</button>
  </div>

  <pre id="output"></pre>

  <div class="input-group">
    <input type="text" id="send-input" placeholder="Type command and press Enter..." disabled>
    <select id="line-ending" disabled>
      <option value="\n">LF</option>
      <option value="\r\n" selected>CR+LF</option>
      <option value="\r">CR</option>
      <option value="">None</option>
    </select>
    <button id="send-btn" disabled>Send</button>
  </div>

  <script>
    const outputEl = document.getElementById('output');
    const connectBtn = document.getElementById('connect-btn');
    const disconnectBtn = document.getElementById('disconnect-btn');
    const resetBtn = document.getElementById('reset-btn');
    const clearBtn = document.getElementById('clear-btn');
    const sendInput = document.getElementById('send-input');
    const sendBtn = document.getElementById('send-btn');
    const lineEndingSelect = document.getElementById('line-ending');

    const BAUD_RATE = 115200; // Matches firmware Serial.begin(115200)

    let port = null;
    let reader = null;
    let writer = null;
    let keepReading = false;

    // Check Web Serial support
    if (!('serial' in navigator)) {
      outputEl.textContent = 'ERROR: Web Serial API not supported. Use Chrome or Edge.\n';
      connectBtn.disabled = true;
    }

    function log(text) {
      outputEl.textContent += text;
      outputEl.scrollTop = outputEl.scrollHeight;
    }

    connectBtn.addEventListener('click', async () => {
      try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: BAUD_RATE });

        log('[Connected at ' + BAUD_RATE + ' baud]\n');

        connectBtn.disabled = true;
        disconnectBtn.disabled = false;
        resetBtn.disabled = false;
        sendInput.disabled = false;
        sendBtn.disabled = false;
        lineEndingSelect.disabled = false;

        // Set up writer
        writer = port.writable.getWriter();

        // Set up reader
        keepReading = true;
        reader = port.readable.getReader();
        const decoder = new TextDecoder();

        try {
          while (keepReading) {
            const { value, done } = await reader.read();
            if (done) break;
            if (value) {
              log(decoder.decode(value, { stream: true }));
            }
          }
        } catch (error) {
          if (keepReading) {
            log('\n[Error: ' + error.message + ']\n');
          }
        } finally {
          reader.releaseLock();
        }

      } catch (error) {
        log('[Connection failed: ' + error.message + ']\n');
      }
    });

    disconnectBtn.addEventListener('click', async () => {
      keepReading = false;

      try {
        if (reader) {
          await reader.cancel();
          reader = null;
        }
        if (writer) {
          await writer.releaseLock();
          writer = null;
        }
        if (port) {
          await port.close();
          port = null;
        }
      } catch (error) {
        log('[Disconnect error: ' + error.message + ']\n');
      }

      log('\n[Disconnected]\n');

      connectBtn.disabled = false;
      disconnectBtn.disabled = true;
      resetBtn.disabled = true;
      sendInput.disabled = true;
      sendBtn.disabled = true;
      lineEndingSelect.disabled = true;
    });

    resetBtn.addEventListener('click', async () => {
      if (!port) return;

      try {
        log('[Restarting device...]\n');

        // Trigger reset using DTR/RTS signals
        await port.setSignals({ dataTerminalReady: false, requestToSend: true });
        await new Promise(r => setTimeout(r, 100));
        await port.setSignals({ dataTerminalReady: true, requestToSend: false });
        await new Promise(r => setTimeout(r, 50));
        await port.setSignals({ dataTerminalReady: false });

        log('[Device restarted]\n');
      } catch (error) {
        log('[Reset error: ' + error.message + ']\n');
      }
    });

    clearBtn.addEventListener('click', () => {
      outputEl.textContent = '';
    });

    async function sendCommand() {
      if (!writer || !sendInput.value) return;

      const text = sendInput.value;
      const ending = lineEndingSelect.value
        .replace('\\r\\n', '\r\n')
        .replace('\\n', '\n')
        .replace('\\r', '\r');

      try {
        const encoder = new TextEncoder();
        await writer.write(encoder.encode(text + ending));
        log('> ' + text + '\n');
        sendInput.value = '';
      } catch (error) {
        log('[Send error: ' + error.message + ']\n');
      }
    }

    sendBtn.addEventListener('click', sendCommand);
    sendInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendCommand();
    });

  </script>
</body>
</html>
