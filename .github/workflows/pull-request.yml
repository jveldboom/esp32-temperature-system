name: pull-request

on:
  pull_request:
  push:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache PlatformIO
        uses: actions/cache@v5
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: ${{ runner.os }}-pio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Get build version
        uses: jveldboom/action-conventional-versioning@v1
        id: get-version

      - name: Build firmware
        env:
          PLATFORMIO_BUILD_FLAGS: >-
            -DFIRMWARE_VERSION=\"${{ steps.get-version.outputs.version }}\"
        run: |
          cd firmware
          pio run

      - name: List build artifacts
        run: |
          echo "Checking for build artifacts..."
          ls -la firmware/.pio/build/esp32-c3/ || echo "Build directory not found"

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v5
        with:
          name: firmware-binaries
          path: |
            firmware/.pio/build/esp32-c3/*.bin
          retention-days: 7

      - name: Run tests
        run: |
          cd firmware
          pio test
        continue-on-error: true  # Don't fail if no tests exist yet
